version: "3.8"
services:
  postgresdb:
    image: postgres:15.2-alpine
    container_name: tic-tac-toe-postgresdb
    environment:
      POSTGRES_USER: tic-tac-toe
      POSTGRES_PASSWORD: tic-tac-toe
      POSTGRES_DB: tic-tac-toe
    ports:
    - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
    - 8080:8080
    environment:
    - ADMINER_DEFAULT_SERVER=postgresdb
    depends_on:
    - postgresdb

volumes:
  pgdata:
