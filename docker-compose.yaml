version: "3.8"
services:
  postgresdb:
    image: postgres:15.2-alpine
    container_name: tic-tac-toe-postgresdb
    environment:
      POSTGRES_USER: tic-tac-toe
      POSTGRES_PASSWORD: tic-tac-toe
      POSTGRES_DB: tic-tac-toe
    ports:
    - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
    - 8080:8080
    environment:
    - ADMINER_DEFAULT_SERVER=postgresdb
    depends_on:
    - postgresdb

  backend:
    build:
      context: ./backend
    container_name: tic-tac-toe-backend
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env.docker
    depends_on:
      - postgresdb
    command: ["./tic-tac-toe", "api"]

  frontend:
    build:
      context: ./frontend
    container_name: tic-tac-toe-frontend
    ports:
      - 3000:80
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:8000
      - NUXT_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
